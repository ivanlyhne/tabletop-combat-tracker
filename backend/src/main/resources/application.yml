spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gm_combat}
    username: ${DB_USERNAME:gm_user}
    password: ${DB_PASSWORD:gm_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    # No default — startup fails fast if JWT_SECRET env var is not set.
    # For local dev: export JWT_SECRET=local-dev-jwt-secret-min-32-chars
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}

jasypt:
  encryptor:
    # No default — startup fails fast if JASYPT_PASSWORD env var is not set.
    # For local dev: export JASYPT_PASSWORD=local-dev-jasypt-password
    password: ${JASYPT_PASSWORD}

server:
  port: 8080
