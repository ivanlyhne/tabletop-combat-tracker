spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gm_combat}
    username: ${DB_USERNAME:gm_user}
    password: ${DB_PASSWORD:gm_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:cmVwbGFjZS13aXRoLTI1Ni1iaXQtYmFzZTY0LXNlY3JldC1pbi1wcm9kdWN0aW9u}
    expiration-ms: 86400000

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:dev-encrypt-password}

server:
  port: 8080
