# Production Docker Compose
# Run from repo root:
#   docker compose -f infra/docker/docker-compose.prod.yml up -d
#
# All secrets come from environment variables. Copy .env.example -> .env
# and fill in values before starting.
#
# Block volume must be mounted at /data before starting:
#   /data/postgres  -- PostgreSQL data directory
#   /data/uploads   -- Map background image uploads

name: combat-tracker

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: combat_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d combat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/combat_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JASYPT_PASSWORD: ${JASYPT_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      UPLOAD_DIR: /data/uploads
    volumes:
      - /data/uploads:/data/uploads
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
