version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: gm-combat-db
    environment:
      POSTGRES_DB: gm_combat
      POSTGRES_USER: gm_user
      POSTGRES_PASSWORD: gm_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gm_user -d gm_combat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
