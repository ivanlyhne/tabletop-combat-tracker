version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: gm-combat-db
    environment:
      POSTGRES_DB: gm_combat
      POSTGRES_USER: gm_user
      POSTGRES_PASSWORD: gm_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gm_user -d gm_combat"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: gm-combat-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gm_combat
      DB_USERNAME: gm_user
      DB_PASSWORD: gm_pass
      # Override these with strong secrets in production
      JWT_SECRET: local-dev-jwt-secret-replace-in-production-use-256bit-base64
      JASYPT_PASSWORD: local-dev-jasypt-password-replace-in-production
      ALLOWED_ORIGINS: http://localhost:4200

volumes:
  pgdata:
