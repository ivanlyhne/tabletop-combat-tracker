@if (showNav()) {
  <div class="app-shell">
    <!-- Persistent icon sidebar -->
    <nav class="side-nav" aria-label="Main navigation">
      <div class="nav-logo" routerLink="/campaigns" matTooltip="GM Combat Tracker" matTooltipPosition="right">
        <mat-icon class="logo-icon">shield</mat-icon>
      </div>

      <mat-divider class="nav-divider"></mat-divider>

      <div class="nav-items">
        <a class="nav-item"
           routerLink="/campaigns"
           routerLinkActive="active"
           matTooltip="My Campaigns"
           matTooltipPosition="right">
          <mat-icon>campaign</mat-icon>
        </a>
        <a class="nav-item"
           routerLink="/settings/ai"
           routerLinkActive="active"
           matTooltip="AI Settings"
           matTooltipPosition="right">
          <mat-icon>smart_toy</mat-icon>
        </a>
      </div>

      <div class="nav-bottom">
        <mat-divider class="nav-divider"></mat-divider>
        <button class="nav-item logout-btn"
                (click)="logout()"
                matTooltip="Logout"
                matTooltipPosition="right">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </nav>

    <!-- Page content -->
    <main class="app-content">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
